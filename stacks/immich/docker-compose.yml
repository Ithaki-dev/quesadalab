name: immich

services:
  immich-server:
    image: "ghcr.io/immich-app/immich-server:${IMMICH_VERSION}"
    container_name: immich-server
    restart: unless-stopped

    env_file:
      - .env

    environment:
      DB_PASSWORD_FILE: /run/secrets/db_password
      IMMICH_TRUSTED_PROXIES: "${TRUSTED_PROXIES}"
      IMMICH_ALLOW_SETUP: "${IMMICH_ALLOW_SETUP}"

    secrets:
      - db_password

    volumes:
      - "${UPLOAD_LOCATION}:/data"
      - /etc/localtime:/etc/localtime:ro

    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      immich-machine-learning:
        condition: service_healthy

    networks:
      - proxy
      - immich-backend

    healthcheck:
      disable: false

    mem_limit: 2g

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.immich.rule=Host(`${IMMICH_FQDN}`)"
      - "traefik.http.routers.immich.entrypoints=websecure"
      - "traefik.http.routers.immich.tls=true"
      - "traefik.http.routers.immich.middlewares=lan-only@file,security-headers@file"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"

  immich-machine-learning:
    image: "ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION}"
    container_name: immich-machine-learning
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - "${MODEL_CACHE_LOCATION}:/cache"

    networks:
      - immich-backend

    healthcheck:
      disable: false

    mem_limit: 2500m

  redis:
    image: "docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9"
    container_name: immich-redis
    restart: unless-stopped

    networks:
      - immich-backend

    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

    mem_limit: 256m

  database:
    image: "ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23"
    container_name: immich-postgres
    restart: unless-stopped
    shm_size: 128mb

    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_DB: "${DB_DATABASE_NAME}"
      POSTGRES_INITDB_ARGS: "--data-checksums"
      DB_STORAGE_TYPE: HDD

    secrets:
      - db_password

    volumes:
      - "${DB_DATA_LOCATION}:/var/lib/postgresql/data"

    networks:
      - immich-backend

    healthcheck:
      disable: false

    mem_limit: 768m

secrets:
  db_password:
    file: "${IMMICH_SECRETS_DIR}/DB_PASSWORD"

networks:
  proxy:
    external: true
  immich-backend:

