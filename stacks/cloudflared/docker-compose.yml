services:
  cloudflared:
    image: cloudflare/cloudflared:2026.7.2
    container_name: cloudflared

    restart: unless-stopped
    stop_grace_period: 30s

    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token-file
      - /run/secrets/tunnel-token

    read_only: true

    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev

    secrets:
      - source: tunnel_token
        target: tunnel-token

    networks:
      - proxy

secrets:
  tunnel_token:
    file: /opt/quesadalab/data/cloudflared/tunnel-token

networks:
  proxy:
    external: true
